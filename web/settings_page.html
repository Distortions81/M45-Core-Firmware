<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Device Settings</title>
  {{THEMES}}
  {{GLOBAL_STYLES}}
  <style>
    h1{margin:0 0 12px;font-size:28px;}
    p,li{line-height:1.5;}
    .status{margin:0 0 20px;display:grid;gap:8px;}
    .box-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 12px;}
    .box-header label{margin:0;}
    .box-action{flex:0 0 auto;}
    label{display:block;margin:12px 0 6px;font-weight:600;}
    .row{display:grid;grid-template-columns:1fr 140px;gap:12px;}
    .field-stack{display:grid;gap:12px;}
    .toggle-group{display:grid;gap:10px;margin-bottom:18px;}
    .range-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;margin:0 0 18px;}
    .range-row label{margin:0;}
    .range-row output{font-variant-numeric:tabular-nums;color:var(--muted);}
    .section-label{margin:18px 0 8px;font-weight:700;}
    .setting-note{margin:4px 0 18px 26px;font-size:12px;line-height:1.35;color:var(--muted);}
    input[type="range"],.range-row input[type="number"]{grid-column:1 / -1;width:100%;margin:0;}
    .toggle-row{
      display:grid;
      grid-template-columns:auto 1fr;
      align-items:center;
      justify-content:start;
      column-gap:10px;
      margin:0;
      font-weight:600;
    }
    .toggle-row input{
      width:auto;
      margin:0;
    }
    .actions{margin-top:18px;}
    .device-box{margin-top:28px;}
    .device-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px;}
    .device-actions a,.device-actions button{display:block;text-align:center;text-decoration:none;}
    button{background:#111827;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;}
    a.button-link{background:#111827;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;text-decoration:none;}
    button[disabled]{opacity:.6;cursor:wait;}
    .danger{background:#b91c1c;}
    #save-status{margin-top:12px;}
    @media (max-width: 640px){
      .row{grid-template-columns:1fr;}
      .box-header{align-items:flex-start;}
      .device-actions{grid-template-columns:1fr;}
      .toggle-row{column-gap:8px;}
    }
  </style>
</head>
<body>
  {{TOOLBAR}}
  <div class="card">
    <h1><span data-setting="device_name">M45 Miner</span> Settings</h1>
    <div class="status">
      <div><strong>Wi-Fi:</strong> <code data-setting="sta_ssid">loading</code></div>
      <div><strong>IP:</strong> <code data-setting="sta_ip">loading</code></div>
    </div>
    <div class="box">
      <div class="box-header">
        <label>Display</label>
        <a class="button-link box-action" href="/wifi">Wi-Fi settings</a>
      </div>
      <div class="toggle-group">
        <label class="toggle-row" for="flip-vertical">
          <input id="flip-vertical" name="flip_vertical" type="checkbox">
          <span>Flip screen</span>
        </label>
        <label class="toggle-row" for="runtime-screensaver">
          <input id="runtime-screensaver" name="runtime_screensaver" type="checkbox">
          <span>Screen saver</span>
        </label>
        <label class="toggle-row" for="display-light-mode">
          <input id="display-light-mode" name="display_light_mode" type="checkbox">
          <span>Light Color Theme</span>
        </label>
        <label class="toggle-row" for="display-text-outline">
          <input id="display-text-outline" name="display_text_outline" type="checkbox">
          <span>LCD text outline</span>
        </label>
      </div>
      <div class="range-row">
        <label for="display-brightness">Display brightness</label>
        <output id="display-brightness-value">0%</output>
        <input id="display-brightness" name="display_brightness" type="range" min="0" max="100" step="5" value="0">
      </div>
      <div class="range-row">
        <label for="display-sleep-minutes">Display sleep</label>
        <output id="display-sleep-minutes-value"></output>
        <input id="display-sleep-minutes" name="display_sleep_minutes" type="number" min="0" max="65535" step="1" value="0">
      </div>
      <div class="section-label">Performance</div>
      <label class="toggle-row" for="performance-mode">
        <input id="performance-mode" name="performance_mode" type="checkbox">
        <span>Performance Mode</span>
      </label>
      <div class="setting-note">Keeps the processor at full speed. It may use more power and run warmer.</div>
      <div class="section-label">Alerts</div>
      <label class="toggle-row" for="block-alerts">
        <input id="block-alerts" name="block_alerts" type="checkbox">
        <span>Block found alerts</span>
      </label>
      <div class="setting-note">Show a web and display alert when this miner finds a block.</div>
      <div class="section-label">Mining</div>
      <label for="primary-server">Main mining pool</label>
      <div class="row field-stack">
        <input id="primary-server" name="primary_server" placeholder="tinyminer.m45core.com">
        <input id="primary-port" name="primary_port" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="5" placeholder="3333">
      </div>
      <label for="backup-server">Backup pool</label>
      <div class="row field-stack">
        <input id="backup-server" name="backup_server" placeholder="solobtc.nmminer.com">
        <input id="backup-port" name="backup_port" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="5" placeholder="3333">
      </div>
      <label for="username">Worker name (optional)</label>
      <input id="username" name="username" placeholder="0M45">
      <label for="wallet-address">Wallet address</label>
      <input id="wallet-address" name="wallet_address" placeholder="bc1qexamplewalletaddress...">
      <div class="actions">
        <button id="save-button" type="button" disabled>Save</button>
      </div>
      <div id="save-status" class="muted">Loading settings...</div>
    </div>
    <div class="box device-box">
      <label>Device</label>
      <div class="device-actions">
        <button id="reboot-button" type="button" disabled>Reboot</button>
        <button id="factory-reset-button" class="danger" type="button" disabled>Factory reset</button>
      </div>
      <div id="device-action-status" class="muted"></div>
    </div>
    <script>
      const saveButton=document.getElementById('save-button');
      const saveStatus=document.getElementById('save-status');
      const rebootButton=document.getElementById('reboot-button');
      const factoryResetButton=document.getElementById('factory-reset-button');
      const deviceActionStatus=document.getElementById('device-action-status');
      const displayBrightness=document.getElementById('display-brightness');
      const displayBrightnessValue=document.getElementById('display-brightness-value');
      const displaySleepMinutes=document.getElementById('display-sleep-minutes');
      const displaySleepMinutesValue=document.getElementById('display-sleep-minutes-value');
      const performanceModeInput=document.getElementById('performance-mode');
      const blockAlertsInput=document.getElementById('block-alerts');
      const settingNodes={};
      document.querySelectorAll('[data-setting]').forEach((node)=>{settingNodes[node.dataset.setting]=node;});
      let actionToken='';
      async function fetchTextWithTimeout(url,options={},timeoutMs=8000){
        const controller=new AbortController();
        const timer=window.setTimeout(()=>controller.abort(),timeoutMs);
        try{
          const response=await fetch(url,{...options,signal:controller.signal});
          const text=await response.text();
          if(!response.ok){
            throw new Error(text||('HTTP '+response.status));
          }
          return text;
        }finally{
          window.clearTimeout(timer);
        }
      }
      displayBrightness.addEventListener('input',()=>{displayBrightnessValue.textContent=displayBrightness.value+'%';});
      function isEnabled(value){
        return value==='1'||value==='true';
      }
      function normalizedDisplaySleepMinutes(value){
        return Math.max(0,parseInt(value,10)||0);
      }
      function displaySleepLabel(value){
        const minutes=normalizedDisplaySleepMinutes(value);
        return minutes===0?'Off':minutes+' min';
      }
      displaySleepMinutesValue.textContent=displaySleepLabel(displaySleepMinutes.value);
      displaySleepMinutes.addEventListener('input',()=>{displaySleepMinutesValue.textContent=displaySleepLabel(displaySleepMinutes.value);});
      function setInputValue(id,value){
        const input=document.getElementById(id);
        if(input){input.value=value||'';}
      }
      function setCheckbox(id,value){
        const input=document.getElementById(id);
        if(input){input.checked=isEnabled(value);}
      }
      function applySettings(data){
        const theme=data.get('theme')==='light'?'light':'dark';
        const deviceName=data.get('device_name')||'M45 Miner';
        document.documentElement.setAttribute('data-theme',theme);
        document.title=deviceName+' Settings';
        if(settingNodes.device_name){settingNodes.device_name.textContent=deviceName;}
        if(settingNodes.sta_ssid){settingNodes.sta_ssid.textContent=data.get('sta_ssid')||'Not configured';}
        if(settingNodes.sta_ip){settingNodes.sta_ip.textContent=data.get('sta_ip')||'Not connected';}
        setCheckbox('flip-vertical',data.get('display_flip_vertical'));
        setCheckbox('runtime-screensaver',data.get('display_runtime_screensaver'));
        setCheckbox('display-light-mode',data.get('display_light_mode'));
        setCheckbox('display-text-outline',data.get('display_text_outline'));
        displayBrightness.value=data.get('display_brightness')||'0';
        displayBrightnessValue.textContent=displayBrightness.value+'%';
        displaySleepMinutes.max=data.get('display_sleep_max_minutes')||'65535';
        displaySleepMinutes.value=data.get('display_sleep_minutes')||'0';
        displaySleepMinutesValue.textContent=displaySleepLabel(displaySleepMinutes.value);
        setCheckbox('performance-mode',data.get('performance_mode'));
        setCheckbox('block-alerts',data.get('block_alerts'));
        setInputValue('primary-server',data.get('stratum_primary_server'));
        setInputValue('primary-port',data.get('stratum_primary_port'));
        setInputValue('backup-server',data.get('stratum_backup_server'));
        setInputValue('backup-port',data.get('stratum_backup_port'));
        setInputValue('username',data.get('stratum_username'));
        setInputValue('wallet-address',data.get('stratum_wallet_address'));
        actionToken=data.get('action_token')||'';
        saveStatus.textContent='';
        saveButton.disabled=false;
        rebootButton.disabled=!actionToken;
        factoryResetButton.disabled=!actionToken;
      }
      async function loadSettings(){
        try{
          const text=await fetchTextWithTimeout('/api/settings',{cache:'no-store'});
          applySettings(new URLSearchParams(text));
        }catch(error){
          saveStatus.textContent='Settings load failed: '+error.message;
        }
      }
      async function saveStratumSettings(){
        const flipVertical=document.getElementById('flip-vertical').checked;
        const runtimeScreensaver=document.getElementById('runtime-screensaver').checked;
        const displayLightMode=document.getElementById('display-light-mode').checked;
        const displayTextOutline=document.getElementById('display-text-outline').checked;
        const displayBrightnessPct=displayBrightness.value;
        const displaySleepMinutesSetting=String(normalizedDisplaySleepMinutes(displaySleepMinutes.value));
        const performanceMode=performanceModeInput.checked;
        const blockAlerts=blockAlertsInput.checked;
        const primaryServer=document.getElementById('primary-server').value.trim();
        const primaryPort=document.getElementById('primary-port').value.trim();
        const backupServer=document.getElementById('backup-server').value.trim();
        const backupPort=document.getElementById('backup-port').value.trim();
        const username=document.getElementById('username').value.trim();
        const walletAddress=document.getElementById('wallet-address').value.trim();
        if(!primaryServer){
          saveStatus.textContent='Main pool address is required.';
          return;
        }
        if(!primaryPort){
          saveStatus.textContent='Main pool port is required.';
          return;
        }
        saveButton.disabled=true;
        saveStatus.textContent='Saving...';
        try{
          await fetchTextWithTimeout('/api/display',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
            body:new URLSearchParams({
              ...(flipVertical?{flip_vertical:'1'}:{}),
              ...(runtimeScreensaver?{runtime_screensaver:'1'}:{}),
              ...(displayLightMode?{display_light_mode:'1'}:{}),
              ...(displayTextOutline?{display_text_outline:'1'}:{}),
              display_brightness:displayBrightnessPct,
              display_sleep_minutes:displaySleepMinutesSetting
            }).toString()
          });
          await fetchTextWithTimeout('/api/system',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
            body:new URLSearchParams({
              ...(performanceMode?{performance_mode:'1'}:{}),
              ...(blockAlerts?{block_alerts:'1'}:{})
            }).toString()
          });
          await fetchTextWithTimeout('/api/stratum',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
            body:new URLSearchParams({
              primary_server:primaryServer,
              primary_port:primaryPort,
              backup_server:backupServer,
              backup_port:backupPort,
              username,
              wallet_address:walletAddress
            }).toString()
          });
          saveStatus.textContent='Saved.';
        }catch(error){
          saveStatus.textContent='Save failed: '+error.message;
        }finally{
          saveButton.disabled=false;
        }
      }
      saveButton.addEventListener('click',saveStratumSettings);
      rebootButton.addEventListener('click',async()=>{
        if(!window.confirm('Reboot now? The web page will disconnect while the device restarts.')){
          return;
        }
        rebootButton.disabled=true;
        deviceActionStatus.textContent='Rebooting...';
        try{
          await fetchTextWithTimeout('/api/reboot',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
            body:new URLSearchParams({action_token:actionToken}).toString()
          });
        }catch(error){
          deviceActionStatus.textContent='Reboot failed: '+error.message;
          rebootButton.disabled=false;
        }
      });
      factoryResetButton.addEventListener('click',async()=>{
        if(!window.confirm('Factory reset? This clears Wi-Fi and mining settings, then reboots.')){
          return;
        }
        factoryResetButton.disabled=true;
        deviceActionStatus.textContent='Resetting...';
        try{
          await fetchTextWithTimeout('/api/factory-reset',{
            method:'POST',
            headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},
            body:new URLSearchParams({action_token:actionToken}).toString()
          });
          deviceActionStatus.textContent='Reset complete. Rebooting...';
        }catch(error){
          deviceActionStatus.textContent='Factory reset failed: '+error.message;
          factoryResetButton.disabled=false;
        }
      });
      loadSettings();
    </script>
  </div>
  {{FOOTER}}
</body>
</html>
