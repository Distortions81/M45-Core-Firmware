name: Release firmware

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.3
      options: --user root

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LCD build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends fonts-dejavu-core python3-pil

      - name: Build OLED firmware
        run: ./scripts/build-firmware.sh --clean --build-dir build-oled

      - name: Build LCD firmware
        run: ./scripts/build-firmware.sh --clean --build-dir build-lcd --ideaspark-19-lcd

      - name: Package release binaries
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME:-manual}"
          file_tag="${tag//\//-}"
          mkdir -p dist

          oled_bin="dist/m45-core-${file_tag}-oled.bin"
          lcd_bin="dist/m45-core-${file_tag}-ideaspark-19-lcd.bin"
          oled_merged_bin="dist/m45-core-${file_tag}-oled-merged.bin"
          lcd_merged_bin="dist/m45-core-${file_tag}-ideaspark-19-lcd-merged.bin"
          release_notes="dist/RELEASE_NOTES.md"

          cp build-oled/m45-core.bin "${oled_bin}"
          cp build-lcd/m45-core.bin "${lcd_bin}"

          . "${IDF_PATH}/export.sh"
          python3 -m esptool --chip esp32 merge_bin \
            -o "${oled_merged_bin}" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000 build-oled/bootloader/bootloader.bin \
            0x8000 build-oled/partition_table/partition-table.bin \
            0x10000 build-oled/m45-core.bin
          python3 -m esptool --chip esp32 merge_bin \
            -o "${lcd_merged_bin}" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000 build-lcd/bootloader/bootloader.bin \
            0x8000 build-lcd/partition_table/partition-table.bin \
            0x10000 build-lcd/m45-core.bin

          (
            cd dist
            sha256sum \
              "$(basename "${oled_bin}")" \
              "$(basename "${lcd_bin}")" \
              "$(basename "${oled_merged_bin}")" \
              "$(basename "${lcd_merged_bin}")" \
              > SHA256SUMS
          )

          {
            printf '%s\n' '## Flash Firmware'
            printf '\n'
            printf '%s\n' 'Use the browser flasher:'
            printf '\n'
            printf '%s\n' 'https://distortions81.github.io/M45-Core-Firmware/'
            printf '\n'
            printf '%s\n' '## Release Assets'
            printf '\n'
            printf '%s\n' "- \`$(basename "${oled_merged_bin}")\`: OLED firmware for direct flashing"
            printf '%s\n' "- \`$(basename "${lcd_merged_bin}")\`: ideaspark ESP32 1.9 inch LCD firmware for direct flashing"
            printf '%s\n' '- `SHA256SUMS`: checksums for release binaries'
            printf '\n'
            printf '%s\n' 'The non-merged `.bin` files are app binaries for developer ESP-IDF workflows.'
          } > "${release_notes}"

          {
            echo "oled_bin=${oled_bin}"
            echo "lcd_bin=${lcd_bin}"
            echo "oled_merged_bin=${oled_merged_bin}"
            echo "lcd_merged_bin=${lcd_merged_bin}"
            echo "release_notes=${release_notes}"
            echo "checksums=dist/SHA256SUMS"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-firmware
          path: |
            ${{ steps.package.outputs.oled_bin }}
            ${{ steps.package.outputs.lcd_bin }}
            ${{ steps.package.outputs.oled_merged_bin }}
            ${{ steps.package.outputs.lcd_merged_bin }}
            ${{ steps.package.outputs.checksums }}

      - name: Attach binaries to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.package.outputs.release_notes }}
          files: |
            ${{ steps.package.outputs.oled_bin }}
            ${{ steps.package.outputs.lcd_bin }}
            ${{ steps.package.outputs.oled_merged_bin }}
            ${{ steps.package.outputs.lcd_merged_bin }}
            ${{ steps.package.outputs.checksums }}
