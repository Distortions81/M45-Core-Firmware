name: Release firmware

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.3
      options: --user root

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LCD build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends fonts-dejavu-core python3-pil

      - name: Build OLED firmware
        run: ./scripts/build-firmware.sh --clean --build-dir build-oled

      - name: Build LCD firmware
        run: ./scripts/build-firmware.sh --clean --build-dir build-lcd --ideaspark-19-lcd

      - name: Package release binaries
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME:-manual}"
          file_tag="${tag//\//-}"
          mkdir -p dist

          oled_bin="dist/m45-core-${file_tag}-oled.bin"
          lcd_bin="dist/m45-core-${file_tag}-ideaspark-19-lcd.bin"
          release_notes="dist/RELEASE_NOTES.md"

          . "${IDF_PATH}/export.sh"
          python3 -m esptool --chip esp32 merge_bin \
            -o "${oled_bin}" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000 build-oled/bootloader/bootloader.bin \
            0x8000 build-oled/partition_table/partition-table.bin \
            0x10000 build-oled/m45-core.bin
          python3 -m esptool --chip esp32 merge_bin \
            -o "${lcd_bin}" \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x1000 build-lcd/bootloader/bootloader.bin \
            0x8000 build-lcd/partition_table/partition-table.bin \
            0x10000 build-lcd/m45-core.bin

          (
            cd dist
            sha256sum \
              "$(basename "${oled_bin}")" \
              "$(basename "${lcd_bin}")" \
              > SHA256SUMS
          )

          {
            printf '%s\n' '## Flash Firmware'
            printf '\n'
            printf '%s\n' 'Use the browser flasher:'
            printf '\n'
            printf '%s\n' 'https://distortions81.github.io/M45-Core-Firmware/'
            printf '\n'
            printf '%s\n' '## Release Assets'
            printf '\n'
            printf '%s\n' "- \`$(basename "${oled_bin}")\`: OLED flash image at 0x0"
            printf '%s\n' "- \`$(basename "${lcd_bin}")\`: ideaspark ESP32 1.9 inch LCD flash image at 0x0"
            printf '%s\n' '- `SHA256SUMS`: checksums for release binaries'
            printf '\n'
            printf '%s\n' 'The browser flasher can reset only the settings area or preserve existing settings while using these same images.'
          } > "${release_notes}"

          {
            echo "oled_bin=${oled_bin}"
            echo "lcd_bin=${lcd_bin}"
            echo "release_notes=${release_notes}"
            echo "checksums=dist/SHA256SUMS"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-firmware
          path: |
            ${{ steps.package.outputs.oled_bin }}
            ${{ steps.package.outputs.lcd_bin }}
            ${{ steps.package.outputs.checksums }}

      - name: Attach binaries to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.package.outputs.release_notes }}
          files: |
            ${{ steps.package.outputs.oled_bin }}
            ${{ steps.package.outputs.lcd_bin }}
            ${{ steps.package.outputs.checksums }}

  deploy-pages:
    name: Deploy web flasher
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-firmware
          path: release-firmware

      - name: Build Pages content
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pages-dist/firmware/latest
          cp -R docs/. pages-dist/
          find release-firmware -type f -name '*.bin' -exec cp {} pages-dist/firmware/latest/ \;
          find release-firmware -type f -name 'SHA256SUMS' -exec cp {} pages-dist/firmware/latest/ \;
          test "$(find pages-dist/firmware/latest -type f -name '*.bin' | wc -l)" -ge 2
          test -f pages-dist/firmware/latest/SHA256SUMS
          (cd pages-dist/firmware/latest && sha256sum --ignore-missing -c SHA256SUMS)
          tag="${GITHUB_REF_NAME}"
          file_tag="${tag//\//-}"
          python3 - <<'PY' pages-dist/firmware/latest "${tag}" "${file_tag}"
          import hashlib
          import json
          import sys
          from pathlib import Path

          out = Path(sys.argv[1])
          tag = sys.argv[2]
          file_tag = sys.argv[3]

          def write_json(name, data):
              with (out / name).open("w", encoding="utf-8") as file:
                  json.dump(data, file, indent=2)
                  file.write("\n")

          def firmware_file(slug):
              name = f"m45-core-{file_tag}-{slug}.bin"
              data = (out / name).read_bytes()
              if len(data) <= 0x10000 or data[0x1000] != 0xE9 or data[0x10000] != 0xE9:
                  raise ValueError(f"{name} is not a merged ESP32 flash image")
              return {
                  "path": name,
                  "sha256": hashlib.sha256(data).hexdigest(),
                  "size": len(data),
              }

          write_json(
              "manifest.json",
              {
                  "version": tag,
                  "settingsRange": {"start": 0x9000, "end": 0xF000},
                  "firmware": {
                      "oled": {
                          "label": "OLED",
                          **firmware_file("oled"),
                      },
                      "lcd": {
                          "label": "LCD",
                          **firmware_file("ideaspark-19-lcd"),
                      },
                  },
              },
          )
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
