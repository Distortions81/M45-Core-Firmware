<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>M45 Core Firmware Flasher</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --fg: #17212f;
        --muted: #5c6a7d;
        --line: #cfd8e3;
        --panel: #ffffff;
        --accent: #1463d8;
        --accent-soft: #e8f0ff;
        --warn-bg: #fff5db;
        --warn-fg: #6f4600;
        --danger: #b42318;
        --ok: #197a45;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111820;
          --fg: #f4f7fb;
          --muted: #b2bfce;
          --line: #344253;
          --panel: #182230;
          --accent: #62a0ff;
          --accent-soft: #1f3555;
          --warn-bg: #33290f;
          --warn-fg: #ffd98f;
          --danger: #ff8a80;
          --ok: #7ed9a2;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      header {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 7vw, 3.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 1.15rem;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .panel {
        display: grid;
        gap: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 20px;
      }

      .section {
        display: grid;
        gap: 10px;
      }

      .firmware-version {
        display: flex;
        gap: 12px;
        align-items: baseline;
        justify-content: space-between;
      }

      .firmware-version span {
        color: var(--muted);
      }

      .firmware-version strong {
        color: var(--fg);
        font-size: 1.1rem;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .choice {
        display: grid;
        gap: 4px;
        min-height: 76px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        cursor: pointer;
      }

      .choice:has(input:checked) {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .choice input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .choice strong {
        color: var(--fg);
      }

      .choice span {
        color: var(--muted);
      }

      .settings-choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      .settings-choice input {
        margin-top: 4px;
      }

      .settings-choice strong {
        color: var(--fg);
      }

      .usb-note {
        border-radius: 8px;
        background: var(--warn-bg);
        color: var(--warn-fg);
        padding: 12px;
        line-height: 1.45;
      }

      .usb-note strong {
        color: inherit;
      }

      .flash-action {
        display: grid;
        gap: 10px;
      }

      #flash-button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      #flash-button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      progress {
        width: 100%;
        height: 10px;
        accent-color: var(--accent);
      }

      .status {
        min-height: 1.5em;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.error {
        color: var(--danger);
        font-weight: 700;
      }

      @media (max-width: 560px) {
        main {
          width: min(100% - 20px, 720px);
          padding-top: 22px;
        }

        .choice-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>M45 Core Flasher</h1>
        <p>Choose the display, connect the device by USB, then flash.</p>
      </header>

      <section class="panel" aria-label="Firmware flasher">
        <div class="firmware-version" aria-live="polite">
          <span>Firmware version</span>
          <strong id="firmware-version">Checking...</strong>
        </div>

        <div class="section">
          <h2>Display</h2>
          <div class="choice-grid">
            <label class="choice">
              <input type="radio" name="display" value="oled" checked>
              <strong>OLED</strong>
              <span>Default M45 Core screen</span>
            </label>
            <label class="choice">
              <input type="radio" name="display" value="lcd">
              <strong>LCD</strong>
              <span>ideaspark 1.9 inch screen</span>
            </label>
          </div>
        </div>

        <div class="section">
          <h2>Settings</h2>
          <label class="settings-choice">
            <input id="reset-settings" type="checkbox" checked>
            <span><strong>Reset WiFi and pool settings.</strong> Uncheck to keep WiFi and pool settings when upgrading.</span>
          </label>
        </div>

        <div class="usb-note">
          <strong>When your browser asks for a USB device, choose the ESP32 serial port.</strong>
          It may be named CP210x, CH340, USB Serial, UART, or COM on Windows.
        </div>

        <div class="flash-action">
          <button id="flash-button" type="button" disabled>Flash Firmware</button>
          <progress id="flash-progress" max="100" value="0" hidden></progress>
          <p id="status" class="status">Checking firmware files...</p>
        </div>
      </section>
    </main>

    <script type="module">
      import { ESPLoader, Transport } from "https://unpkg.com/esptool-js@0.6.0/bundle.js";

      const MANIFEST_PATH = "firmware/latest/manifest.json";
      const DEFAULT_SETTINGS_RANGE = { start: 0x9000, end: 0xF000 };
      const BOOTLOADER_OFFSET = 0x1000;
      const PARTITION_TABLE_OFFSET = 0x8000;
      const APP_OFFSET = 0x10000;
      const FLASH_BAUD = 921600;
      const ROM_BAUD = 115200;
      const POST_FLASH_RESET_SEQUENCE = "D0|R1|W100|R0|W100";

      const versionEl = document.querySelector("#firmware-version");
      const statusEl = document.querySelector("#status");
      const progressEl = document.querySelector("#flash-progress");
      const flashButtonEl = document.querySelector("#flash-button");
      const resetSettingsEl = document.querySelector("#reset-settings");
      const displayInputs = Array.from(document.querySelectorAll("input[name='display']"));

      let manifest = null;
      let settingsRange = DEFAULT_SETTINGS_RANGE;
      let firmwareFiles = {};
      let busy = false;

      function selectedDisplay() {
        return document.querySelector("input[name='display']:checked").value;
      }

      function setStatus(message, type = "") {
        statusEl.textContent = message;
        statusEl.classList.toggle("ok", type === "ok");
        statusEl.classList.toggle("error", type === "error");
      }

      function setProgress(value, visible = true) {
        progressEl.hidden = !visible;
        progressEl.value = Math.max(0, Math.min(100, value));
      }

      function readyToFlash() {
        return Boolean(manifest && firmwareFiles[selectedDisplay()] && !busy);
      }

      function refreshControls() {
        const enabled = readyToFlash();
        flashButtonEl.disabled = !enabled;
        displayInputs.forEach((input) => {
          input.disabled = busy;
        });
        resetSettingsEl.disabled = busy;
      }

      function manifestUrl() {
        return new URL(MANIFEST_PATH, window.location.href);
      }

      function firmwareUrl(path) {
        return new URL(path, manifestUrl()).toString();
      }

      async function sha256Hex(data) {
        const digest = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(digest))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      }

      async function loadFirmwareFile(key, fileInfo) {
        setStatus(`Verifying ${fileInfo.label} firmware...`);
        const response = await fetch(firmwareUrl(fileInfo.path), { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Failed to download ${fileInfo.path} with HTTP ${response.status}`);
        }

        const buffer = await response.arrayBuffer();
        const data = new Uint8Array(buffer);
        if (fileInfo.size && data.length !== fileInfo.size) {
          throw new Error(`${fileInfo.path} has the wrong size`);
        }

        const actualSha = await sha256Hex(data);
        if (actualSha !== fileInfo.sha256.toLowerCase()) {
          throw new Error(`${fileInfo.path} checksum did not match`);
        }

        firmwareFiles[key] = {
          ...fileInfo,
          data,
        };
      }

      async function loadManifestAndFirmware() {
        if (!window.isSecureContext) {
          throw new Error("Open this page over HTTPS to use Web Serial.");
        }
        if (!("serial" in navigator)) {
          throw new Error("Use Chrome or Edge on desktop. This browser does not support Web Serial.");
        }
        if (!crypto.subtle) {
          throw new Error("This browser cannot verify firmware checksums.");
        }

        const response = await fetch(manifestUrl(), { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Firmware manifest failed to load with HTTP ${response.status}`);
        }

        manifest = await response.json();
        versionEl.textContent = manifest.version;
        settingsRange = manifest.settingsRange || DEFAULT_SETTINGS_RANGE;

        const entries = Object.entries(manifest.firmware || {});
        if (!entries.length) {
          throw new Error("Firmware manifest does not list any files.");
        }

        for (const [key, fileInfo] of entries) {
          await loadFirmwareFile(key, fileInfo);
        }

        setStatus("Checksums verified. Ready to flash.", "ok");
        refreshControls();
      }

      function firmwareParts(data, resetSettings) {
        const start = settingsRange.start;
        const end = settingsRange.end;
        if (
          !Number.isInteger(start) ||
          !Number.isInteger(end) ||
          start < 0 ||
          end <= start ||
          start % 0x1000 !== 0 ||
          end % 0x1000 !== 0 ||
          end > data.length
        ) {
          throw new Error("Firmware settings range is invalid.");
        }
        if (
          data.length <= APP_OFFSET ||
          data[BOOTLOADER_OFFSET] !== 0xE9 ||
          data[PARTITION_TABLE_OFFSET] !== 0xAA ||
          data[APP_OFFSET] !== 0xE9
        ) {
          throw new Error("Firmware image does not match the expected ESP-IDF flash layout.");
        }

        const parts = [
          { data: data.slice(BOOTLOADER_OFFSET, PARTITION_TABLE_OFFSET), address: BOOTLOADER_OFFSET },
          { data: data.slice(PARTITION_TABLE_OFFSET, start), address: PARTITION_TABLE_OFFSET },
        ];

        if (resetSettings) {
          parts.push({
            data: new Uint8Array(end - start).fill(0xFF),
            address: start,
          });
        }

        parts.push({ data: data.slice(APP_OFFSET), address: APP_OFFSET });
        return parts.filter((part) => part.data.length > 0);
      }

      function updateWriteProgress(parts, fileIndex, written, total) {
        if (!parts.length || !total) {
          return;
        }

        if (!parts.progress) {
          parts.progress = new Array(parts.length).fill(0);
          parts.totalBytes = parts.reduce((sum, part) => sum + part.data.length, 0);
        }

        parts.progress[fileIndex] = written / total;
        const completedBytes = parts.progress.reduce(
          (sum, partProgress, index) => sum + partProgress * parts[index].data.length,
          0,
        );
        const percent = Math.round((completedBytes / parts.totalBytes) * 100);
        setProgress(percent);
        setStatus(`Writing firmware... ${percent}%`);
      }

      async function disconnectTransport(transport) {
        if (!transport) {
          return;
        }
        try {
          await transport.disconnect();
        } catch (_) {
          // The port may already be closed after reset.
        }
      }

      async function flashFirmware() {
        const selected = selectedDisplay();
        const file = firmwareFiles[selected];
        if (!file || busy) {
          return;
        }

        busy = true;
        refreshControls();
        setProgress(0);

        let transport = null;
        try {
          setStatus("Choose the ESP32 serial port in the browser prompt.");
          const port = await navigator.serial.requestPort();
          transport = new Transport(port, false);
          const esploader = new ESPLoader({
            transport,
            baudrate: FLASH_BAUD,
            romBaudrate: ROM_BAUD,
            debugLogging: false,
            terminal: {
              clean() {},
              write() {},
              writeLine() {},
            },
          });

          setStatus("Connecting to ESP32...");
          await esploader.main();
          if (esploader.chip.CHIP_NAME !== "ESP32") {
            throw new Error(`Connected chip is ${esploader.chip.CHIP_NAME}, not ESP32.`);
          }

          const resetSettings = resetSettingsEl.checked;
          const parts = firmwareParts(file.data, resetSettings);

          if (resetSettings) {
            setStatus("Resetting settings area and writing firmware...");
          } else {
            setStatus("Writing firmware and keeping settings...");
          }

          await esploader.writeFlash({
            fileArray: parts,
            flashSize: "4MB",
            flashMode: "dio",
            flashFreq: "40m",
            eraseAll: false,
            compress: true,
            reportProgress: (fileIndex, written, total) => {
              updateWriteProgress(parts, fileIndex, written, total);
            },
          });

          setStatus("Restarting device...");
          let resetWorked = true;
          try {
            await esploader.after("custom_reset", false, POST_FLASH_RESET_SEQUENCE);
          } catch (_) {
            resetWorked = false;
          }
          await disconnectTransport(transport);
          transport = null;
          setProgress(100);
          setStatus(
            `${resetSettings
              ? "Flash complete. WiFi and pool settings were reset."
              : "Flash complete. WiFi and pool settings were kept."} ${
              resetWorked
                ? "The device should restart now."
                : "Press RESET or unplug and reconnect USB to restart the device."
            }`,
            "ok",
          );
        } catch (error) {
          await disconnectTransport(transport);
          const message = error.name === "NotFoundError"
            ? "No USB device was selected."
            : error.message || String(error);
          setStatus(`Flash failed: ${message}`, "error");
          setProgress(0, false);
        } finally {
          busy = false;
          refreshControls();
        }
      }

      displayInputs.forEach((input) => input.addEventListener("change", refreshControls));
      resetSettingsEl.addEventListener("change", refreshControls);
      flashButtonEl.addEventListener("click", flashFirmware);

      loadManifestAndFirmware().catch((error) => {
        manifest = null;
        firmwareFiles = {};
        versionEl.textContent = "Unavailable";
        flashButtonEl.disabled = true;
        setStatus(`INVALID FIRMWARE FILES: ${error.message}`, "error");
      });
    </script>
  </body>
</html>
